<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Table | Caffe Premium</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="custom-cursor">
        <div class="bean-shape"></div>
    </div>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">Caffe<span>.</span></a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="registration.html" class="btn-book">Book Table</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section style="margin-top: 100px;">
        <h1 class="section-title">Reserve <span>Table</span></h1>
        <div style="max-width: 500px; margin: 0 auto; background: white; padding: 3rem; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            <form id="bookingForm" onsubmit="event.preventDefault(); alert('Reservation Confirmed! We look forward to seeing you.');">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem;">Name</label>
                    <input type="text" style="width: 100%; padding: 1rem; border: 1px solid #eee; border-radius: 10px;" required>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem;">Guests</label>
                    <select style="width: 100%; padding: 1rem; border: 1px solid #eee; border-radius: 10px;">
                        <option>1 Person</option>
                        <option>2 People</option>
                        <option>4 People</option>
                        <option>6+ People</option>
                    </select>
                </div>
                <button type="submit" style="width: 100%; padding: 1.2rem; background: var(--coffee-dark); color: white; border: none; border-radius: 15px; font-weight: 600; cursor: pointer;">Confirm Booking</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="footer-logo">Caffe<span>.</span></div>
        <p class="copyright">© 2026 CAFFE PREMIUM EXPERIENCE. ALL RIGHTS RESERVED.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
