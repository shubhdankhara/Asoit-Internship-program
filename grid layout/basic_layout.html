<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grid Layout</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: #f2f2f2;
      padding: 20px;
    }

    .container{
      width: 90%;
      margin: auto;
      height: 100vh;

      display: grid;

      grid-template-columns: 3fr 1fr;
      grid-template-rows: 80px 1fr 80px;

      gap: 5px;
    }

    .header{
      grid-column: 1 / 3;
      background: rgb(94, 94, 94);

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 30px;
      font-weight: bold;
    }

    .content{
      background: rgb(94, 94, 94);


      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 35px;
      font-weight: bold;
    }

    .sidebar{
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 5px;
    }

    .box{
     background: rgb(94, 94, 94);


      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 25px;
      font-weight: bold;
    }

    .footer{
      grid-column: 1 / 3;
      background: rgb(94, 94, 94);

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 30px;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="header">Header</div>

    <div class="content">Content</div>

    <div class="sidebar">
      <div class="box">HTML</div>
      <div class="box">CSS</div>
      <div class="box">JS</div>
    </div>

    <div class="footer">Footer</div>

  </div>

</body>
</html>
